version: '3.8'

services:
  mcp-git:
    build:
      context: ./McpGit
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    container_name: mcp-git-server

  sqlmcp:
    build:
      context: ./sqlmcp
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    container_name: sqlmcp-server

  file-reader:
    build:
      context: ./FileReader
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    container_name: file-reader-server

  repo-explainer:
    build:
      context: ./repoExplainer
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    container_name: repo-explainer-server
