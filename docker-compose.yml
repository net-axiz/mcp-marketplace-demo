version: '3.8'

services:
  mcp-git:
    build:
      context: ./McpGit
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    container_name: mcp-git-server

  sqlmcp:
    build:
      context: ./sqlmcp
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    container_name: sqlmcp-server

  file-reader:
    build:
      context: ./FileReader
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    container_name: file-reader-server

  repo-explainer:
    build:
      context: ./repoExplainer
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    container_name: repo-explainer-server

  ollama-server:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data:
