apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-explainer
  namespace: repo-explainer
  labels:
    app: repo-explainer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: repo-explainer
  template:
    metadata:
      labels:
        app: repo-explainer
    spec:
      # initContainer'lar, asıl uygulama başlamadan önce bağımlı olduğu
      # üç MCP sunucusunun ve Ollama'nın portlarının açık olmasını bekler.
      initContainers:
        - name: wait-for-mcp-git
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z mcp-git-server 8081; do echo 'mcp-git-server bekleniyor...'; sleep 2; done"
        - name: wait-for-sqlmcp
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z sqlmcp-server 8082; do echo 'sqlmcp-server bekleniyor...'; sleep 2; done"
        - name: wait-for-file-reader
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z file-reader-server 8083; do echo 'file-reader-server bekleniyor...'; sleep 2; done"
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z ollama-server 11434; do echo 'ollama-server bekleniyor...'; sleep 2; done"
      containers:
        - name: repo-explainer
          image: repo-explainer-image:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: SERVER_PORT
              value: "8084"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: repo-explainer-secrets
                  key: GITHUB_TOKEN
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: repo-explainer-config
                  key: OLLAMA_BASE_URL
          startupProbe:
            tcpSocket:
              port: 8084
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 1
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: repo-explainer-server
  namespace: repo-explainer
spec:
  selector:
    app: repo-explainer
  ports:
    - port: 8084
      targetPort: 8084
      nodePort: 30084
  type: NodePort
