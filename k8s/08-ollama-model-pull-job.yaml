# Bu Job, Ollama pod'u ayakta olduktan sonra bir kerelik çalışıp modeli indirir.
# Ollama container'ı ilk açıldığında içi boştur - "ollama pull" yapılmadan
# hiçbir chat isteğine yanıt veremez.
#
# Model: llama3.2 (3B parametreli küçük model, run.sh'taki yerel akışla aynı).
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-pull
  namespace: repo-explainer
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z ollama-server 11434; do echo 'ollama-server bekleniyor...'; sleep 2; done"
      containers:
        - name: ollama-pull
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_HOST
              value: "http://ollama-server:11434"
          command:
            - sh
            - -c
            - "ollama pull llama3.2"
