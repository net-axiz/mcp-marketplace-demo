# Repo Explainer — Uygulama Yapılandırması
spring:
  application:
    name: repo-explainer

  # --- MCP Server Ayarları (kendini dışarıya açmak için) ---
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        stdio: false
        type: SYNC

      # --- MCP Client Ayarları (diğer sunuculara bağlanmak için) ---
      client:
        enabled: true
        name: repo-explainer-client
        type: SYNC
        toolcallback:
          enabled: true
        sse:
          connections:
            git-mcp:
              url: http://localhost:8081
            sql-explainer:
              url: http://localhost:8082

    # --- Anthropic (LLM) Ayarları ---
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514

# --- Sunucu Portu ---
server:
  port: ${SERVER_PORT:8003}

# --- GitHub Token ---
github:
  token: ${GITHUB_TOKEN:}

# --- Logging ---
logging:
  level:
    org.springframework.ai.mcp: DEBUG
    com.repoexplainer: DEBUG
