# Repo Explainer
spring:
  application:
    name: repo-explainer

  # ---MCP Server---
  ai:
    mcp:
      server:
        protocol: STREAMABLE
        stdio: false
        type: SYNC

      # ---MCP Client---
      client:
        enabled: true
        name: repo-explainer-client
        type: SYNC
        toolcallback:
          enabled: true
        sse:
          connections:
            git-mcp:
              url: http://mcp-git:8081
            sql-explainer:
              url: http://sqlmcp:8082

    # --- Anthropic (LLM)---
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-20250514

server:
  port: ${SERVER_PORT:8084}

# --- GitHub Token ---
github:
  token: ${GITHUB_TOKEN:}

# --- Logging ---
logging:
  level:
    org.springframework.ai.mcp: DEBUG
    com.repoexplainer: DEBUG
